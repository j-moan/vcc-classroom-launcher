<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <meta name="description" content="VCC Classroom Launcher Teacher Mode" />

    <title>VCC Classroom Launcher - Teacher Mode</title>

    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:," />
  </head>

  <body>
    <header class="site-header">
      <div class="teacher-access-buttons">
        <button
          id="preview-button"
          class="publish-button"
          type="button"
          aria-label="Preview Current Draft"
        >
          Preview
        </button>
      </div>

      <div class="header-text">
        <h1 id="pageTitle">Campbell Classroom</h1>
        <p id="pageSubtitle" class="page-subtitle" hidden></p>
      </div>
    </header>

    <main class="teacher-page">
      <section class="teacher-workspace">
        <aside class="teacher-tree-panel" aria-label="Container Tree">
          <h2 class="teacher-panel-title">Pages</h2>

          <div id="containerTree" class="teacher-panel-content teacher-tree">
            <!-- Container tree is rendered by teacher.js -->
          </div>
        </aside>

        <section class="teacher-page-panel" aria-label="Page Tile Management">
          <h2 class="teacher-panel-title">Page Tiles</h2>

          <div class="teacher-panel-content">
            <!-- Tile management will go here -->
          </div>
        </section>
      </section>

      <footer class="teacher-toolbar">
        <!-- B1 - Add Subpage -->
        <button id="add-subpage-button" class="teacher-tool-button" type="button">
          Add Subpage
        </button>

        <!-- B2 - Rename Page -->
        <button id="rename-page-button" class="teacher-tool-button" type="button">
          Rename Page
        </button>

        <!-- B3 - Delete Page -->
        <button id="delete-page-button" class="teacher-tool-button" type="button">
          Delete Page
        </button>

        <!-- B4 - Add Section -->
        <button id="add-separator-button" class="teacher-tool-button" type="button">
          Add Separator
        </button>

        <!-- B5 - Add Tile -->
        <button id="add-tile-button" class="teacher-tool-button" type="button">Add Tile</button>

        <!-- B6 - Delete Tile -->
        <button id="delete-item-button" class="teacher-tool-button" type="button">
          Delete Item
        </button>

        <!-- B7 - Move Up -->
        <button id="move-item-up-button" class="teacher-tool-button" type="button">Move Up</button>

        <!-- B8 - Move Down -->
        <button id="move-item-down-button" class="teacher-tool-button" type="button">
          Move Down
        </button>

        <!-- B9 -  -->
        <button class="teacher-tool-button" type="button">B9</button>

        <!-- B10 - Catalog Assets -->
        <button id="catalog-assets-button" class="teacher-tool-button" type="button">
          Catalog Assets
        </button>

        <!-- B11 - Publish -->
        <button id="publish-button" class="teacher-tool-button" type="button">Publish</button>

        <!-- B12 - Publish -->
        <button class="teacher-tool-button" type="button">B12</button>
      </footer>
    </main>

    <dialog id="add-subpage-dialog" class="app-dialog" aria-labelledby="add-subpage-title">
      <form id="add-subpage-form" class="dialog-form" method="dialog">
        <h2 id="add-subpage-title" class="dialog-title">Add Subpage</h2>

        <label for="subpage-name-input">Page Name:</label>

        <input
          id="subpage-name-input"
          class="dialog-input"
          type="text"
          autocomplete="off"
          required
        />

        <div class="dialog-actions">
          <button
            id="cancel-add-subpage-button"
            class="dialog-button dialog-button-secondary"
            type="button"
          >
            Cancel
          </button>

          <button class="dialog-button dialog-button-primary" type="submit">Create</button>
        </div>
      </form>
    </dialog>

    <dialog id="message-dialog" class="app-dialog" aria-labelledby="message-dialog-title">
      <div class="dialog-form">
        <h2 id="message-dialog-title" class="dialog-title">Message</h2>

        <p id="message-dialog-text" class="teacher-message-text"></p>

        <div class="dialog-actions">
          <button
            id="message-dialog-cancel-button"
            class="dialog-button dialog-button-secondary"
            type="button"
            hidden
          >
            Do Not Delete
          </button>

          <button
            id="message-dialog-ok-button"
            class="dialog-button dialog-button-primary"
            type="button"
          >
            OK
          </button>
        </div>
      </div>
    </dialog>

    <dialog id="add-tile-dialog" class="app-dialog" aria-labelledby="add-tile-title">
      <form id="add-tile-form" class="dialog-form" method="dialog">
        <h2 id="add-tile-title" class="dialog-title">Add Tile</h2>

        <label for="tile-name-input">Name:</label>
        <input id="tile-name-input" class="dialog-input" type="text" autocomplete="off" required />

        <label for="tile-type-select">Type:</label>
        <select id="tile-type-select" class="dialog-input">
          <option value="placeholder">Placeholder</option>
          <option value="video">Video</option>
          <option value="website">Website</option>
          <option value="pdf">PDF</option>
          <option value="powerpoint">PowerPoint</option>
          <option value="image">Image</option>
          <option value="information">Information</option>
        </select>

        <label for="tile-thumbnail-input">Thumbnail:</label>

        <div class="tile-thumbnail-editor">
          <div class="tile-thumbnail-preview-frame">
            <img
              id="tile-thumbnail-preview"
              class="tile-thumbnail-preview"
              src="resources/default-tile.jpg"
              alt="Selected tile image"
            />
          </div>

          <div>
            <input
              id="tile-thumbnail-input"
              class="dialog-input"
              type="text"
              value="resources/default-tile.jpg"
              readonly
            />

            <button
              id="change-tile-thumbnail-button"
              class="dialog-button dialog-button-secondary"
              type="button"
            >
              Change Image
            </button>
          </div>
        </div>

        <div id="tile-destination-group" hidden>
          <label id="tile-destination-label" for="tile-destination-input"> Destination: </label>

          <input id="tile-destination-input" class="dialog-input" type="text" autocomplete="off" />
        </div>

        <div class="dialog-actions">
          <button
            id="cancel-add-tile-button"
            class="dialog-button dialog-button-secondary"
            type="button"
          >
            Cancel
          </button>

          <button class="dialog-button dialog-button-primary" type="submit">Create</button>
        </div>
      </form>
    </dialog>

    <dialog id="add-separator-dialog" class="app-dialog" aria-labelledby="add-separator-title">
      <form id="add-separator-form" class="dialog-form" method="dialog">
        <h2 id="add-separator-title" class="dialog-title">Add Separator</h2>

        <label for="separator-name-input">Name:</label>
        <input
          id="separator-name-input"
          class="dialog-input"
          type="text"
          autocomplete="off"
          required
        />

        <div class="dialog-actions">
          <button
            id="cancel-add-separator-button"
            class="dialog-button dialog-button-secondary"
            type="button"
          >
            Cancel
          </button>

          <button class="dialog-button dialog-button-primary" type="submit">Create</button>
        </div>
      </form>
    </dialog>

    <dialog
      id="image-picker-dialog"
      class="app-dialog image-picker-dialog"
      aria-labelledby="image-picker-title"
    >
      <form id="image-picker-form" class="dialog-form" method="dialog">
        <h2 id="image-picker-title" class="dialog-title">Choose Image</h2>

        <div class="image-picker-layout">
          <section class="image-picker-list-panel">
            <label for="image-search-input">Search:</label>

            <input
              id="image-search-input"
              class="dialog-input"
              type="search"
              autocomplete="off"
              placeholder="Type part of the filename"
            />

            <div
              id="image-picker-list"
              class="image-picker-list"
              role="listbox"
              aria-label="Available images"
            ></div>
          </section>

          <section class="image-picker-preview-panel">
            <h3>Preview</h3>

            <div class="image-picker-preview-frame">
              <img
                id="image-picker-preview"
                class="image-picker-preview"
                src="resources/default-tile.jpg"
                alt=""
              />
            </div>

            <p id="image-picker-file-name" class="image-picker-file-name">No image selected</p>
          </section>
        </div>

        <div class="dialog-actions">
          <button
            id="cancel-image-picker-button"
            class="dialog-button dialog-button-secondary"
            type="button"
          >
            Cancel
          </button>

          <button
            id="select-image-button"
            class="dialog-button dialog-button-primary"
            type="submit"
            disabled
          >
            Select
          </button>
        </div>
      </form>
    </dialog>

    <dialog
      id="pdf-picker-dialog"
      class="app-dialog pdf-picker-dialog"
      aria-labelledby="pdf-picker-title"
    >
      <form id="pdf-picker-form" class="dialog-form" method="dialog">
        <h2 id="pdf-picker-title" class="dialog-title">Choose PDF</h2>

        <label for="pdf-search-input">Search:</label>

        <input
          id="pdf-search-input"
          class="dialog-input"
          type="search"
          autocomplete="off"
          placeholder="Type part of the filename"
        />

        <div
          id="pdf-picker-list"
          class="pdf-picker-list"
          role="listbox"
          aria-label="Available PDF files"
        ></div>

        <div class="dialog-actions">
          <button
            id="cancel-pdf-picker-button"
            class="dialog-button dialog-button-secondary"
            type="button"
          >
            Cancel
          </button>

          <button
            id="select-pdf-button"
            class="dialog-button dialog-button-primary"
            type="submit"
            disabled
          >
            Select
          </button>
        </div>
      </form>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="assets/data/data.js"></script>
    <script src="assets/images/catalog.js"></script>
    <script src="assets/pdfs/catalog.js"></script>
    <script type="module" src="teacher.js"></script>
  </body>
</html>
